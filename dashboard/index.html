<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel de análise — Padrões deceptivos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --ink: #000;
      --paper: #fff;
      --card: #fff;
      --line: #d9d9d9;
      --line-strong: #000;
      --muted: #6b6b66;
      --yellow: #f3d250;
      --yellow-soft: #fbf0c2;
      --gray: #d9d9d9;
      --pad: 36px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Merriweather", ui-serif, Georgia, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button { font-family: inherit; cursor: pointer; }
    select { font-family: inherit; }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: var(--pad);
    }

    /* ============================ HEADER ============================ */
    .dash-head {
      border-bottom: 3px solid var(--ink);
      padding-bottom: 20px;
      margin-bottom: 8px;
    }

    .dash-head .kicker {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 10px;
    }

    .dash-head h1 {
      font-size: 30px;
      line-height: 1.18;
      margin: 0 0 12px;
      font-weight: 700;
      max-width: 860px;
      text-wrap: balance;
    }

    .dash-head .lede {
      margin: 0;
      max-width: 760px;
      color: #333;
      font-size: 15px;
      line-height: 1.6;
    }

    .status {
      margin-top: 14px;
      font-size: 12.5px;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gray);
    }

    .status .dot.live { background: #3a9d4a; }

    /* ========================== FILTER BAR ========================== */
    .filterbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--paper);
      border-bottom: 1px solid var(--ink);
      margin: 18px 0 26px;
      padding: 14px 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 18px 26px;
    }

    .fgroup {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .fgroup > .flabel {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      flex: 0 0 auto;
    }

    .pills { display: inline-flex; flex-wrap: wrap; gap: 6px; }

    .pill {
      border: 1px solid var(--line-strong);
      background: var(--card);
      color: #444;
      font-size: 13.5px;
      padding: 7px 14px;
      transition: background 0.14s ease, color 0.14s ease, border-color 0.14s ease;
    }

    .pill:hover { background: #f4f4f4; border-color: var(--ink); }

    .pill.is-active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .fselect {
      border: 1px solid var(--line-strong);
      background: var(--card);
      color: var(--ink);
      font-size: 13.5px;
      padding: 8px 12px;
      max-width: 280px;
    }

    .fselect:disabled { opacity: 0.45; cursor: not-allowed; }

    .seg {
      margin-left: auto;
      display: inline-flex;
      border: 1px solid var(--ink);
      flex: 0 0 auto;
    }

    .seg button {
      border: 0;
      background: var(--card);
      color: #333;
      font-size: 14px;
      padding: 9px 20px;
      border-right: 1px solid var(--line);
    }

    .seg button:last-child { border-right: 0; }

    .seg button.is-active { background: var(--yellow); color: var(--ink); font-weight: 700; }

    /* ============================ CARDS ============================ */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--ink);
      padding: 18px 20px;
    }

    .stat-card .num {
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-card .num .of { font-size: 17px; color: var(--muted); font-weight: 400; }

    .stat-card .lbl { font-size: 12.5px; color: var(--muted); margin-top: 10px; line-height: 1.4; }

    .stat-card .sub { font-size: 12px; color: #555; margin-top: 5px; }

    /* ====================== SECTION SCAFFOLD ====================== */
    .section { margin: 38px 0; }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 18px;
    }

    .section-head h2 { font-size: 21px; margin: 0; font-weight: 700; }

    .section-head .hint { font-size: 12.5px; color: var(--muted); }

    /* ====================== PLATFORM INTROS ====================== */
    .intro-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .intro-card {
      background: var(--card);
      border: 1px solid var(--ink);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .intro-card h3 { margin: 0; font-size: 19px; }

    .intro-card .desc { margin: 0; font-size: 14px; line-height: 1.6; color: #333; }

    .intro-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      margin-top: 2px;
    }

    .chiplet {
      font-size: 12px;
      background: #f5f5f5;
      border: 1px solid var(--line);
      padding: 4px 11px;
      color: #444;
    }

    .chiplet b { color: var(--ink); font-variant-numeric: tabular-nums; }

    .intro-top {
      font-size: 12.5px;
      color: var(--muted);
      border-top: 1px dashed var(--line);
      padding-top: 12px;
      line-height: 1.5;
    }

    .intro-top b { color: var(--ink); }

    /* ====================== KEY FINDINGS ====================== */
    .findings {
      background: var(--card);
      border: 1px solid var(--ink);
      border-left: 4px solid var(--yellow);
      padding: 22px 24px;
    }

    .findings ul { margin: 0; padding-left: 20px; display: flex; flex-direction: column; gap: 10px; }

    .findings li { font-size: 14.5px; line-height: 1.6; }

    .findings b { font-weight: 700; }

    /* ========================== HEATMAP ========================== */
    .heat-tools { display: inline-flex; gap: 6px; }

    .heat-tools button {
      border: 1px solid var(--ink);
      background: var(--card);
      color: #444;
      font-size: 12.5px;
      padding: 6px 12px;
    }

    .heat-tools button.is-active { background: var(--ink); color: #fff; border-color: var(--ink); }

    .table-scroll {
      overflow-x: auto;
      border: 1px solid var(--ink);
      background: var(--card);
    }

    table.heat { border-collapse: collapse; width: 100%; font-size: 13px; }

    table.heat th, table.heat td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 9px 10px;
      text-align: center;
      white-space: nowrap;
    }

    table.heat thead th {
      position: sticky;
      top: 0;
      background: var(--paper);
      font-size: 12px;
      font-weight: 700;
      z-index: 1;
    }

    table.heat th.rowhead {
      text-align: left;
      font-weight: 400;
      position: sticky;
      left: 0;
      background: var(--card);
      z-index: 2;
      max-width: 280px;
      white-space: normal;
    }

    table.heat thead th.rowhead { z-index: 3; background: var(--paper); }

    table.heat th.rowhead .en {
      display: block;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    table.heat td.cell { font-variant-numeric: tabular-nums; font-weight: 700; cursor: default; }

    table.heat td.zero { color: #cdcabf; font-weight: 400; }

    table.heat .total { background: var(--paper); font-weight: 700; font-variant-numeric: tabular-nums; }

    table.heat tr.totalrow th, table.heat tr.totalrow td {
      border-top: 2px solid var(--line-strong);
      background: var(--paper);
      font-weight: 700;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend .bar {
      height: 12px;
      width: 200px;
      border: 1px solid var(--line);
      background: linear-gradient(90deg, #fff7d6, var(--yellow) 55%, #b8860b);
    }

    /* ========================== CHARTS ========================== */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 18px;
    }

    .chart-card {
      background: var(--card);
      border: 1px solid var(--ink);
      padding: 20px 22px;
    }

    .chart-card h3 { margin: 0 0 4px; font-size: 16px; }

    .chart-card .csub { margin: 0 0 16px; font-size: 12.5px; color: var(--muted); }

    .bars { display: flex; flex-direction: column; gap: 11px; }

    .bar-row { display: grid; grid-template-columns: 1fr; gap: 5px; }

    .bar-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      font-size: 13px;
    }

    .bar-label .name { color: #333; }
    .bar-label .name .en { color: var(--muted); font-style: italic; font-size: 11.5px; }
    .bar-label .val { font-weight: 700; font-variant-numeric: tabular-nums; flex: 0 0 auto; }

    .bar-track { height: 12px; background: #f5f5f5; border: 1px solid var(--line); overflow: hidden; }

    .bar-fill { height: 100%; background: var(--yellow); min-width: 2px; transition: width 0.4s ease; }
    .bar-fill.sev { background: #d98b2b; }

    /* severity distribution */
    .sevdist { display: flex; align-items: flex-end; gap: 12px; height: 150px; padding-top: 8px; }

    .sevcol { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 8px; height: 100%; }

    .sevcol .col {
      width: 100%;
      max-width: 54px;
      background: var(--yellow);
      min-height: 3px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      transition: height 0.4s ease;
    }

    .sevcol .col .cnt { font-size: 12px; font-weight: 700; margin-top: -20px; font-variant-numeric: tabular-nums; }
    .sevcol .sevn { font-size: 13px; font-weight: 700; }
    .sevcol .sevl { font-size: 10.5px; color: var(--muted); text-align: center; line-height: 1.2; }

    /* ===================== DETAILED VIEW ===================== */
    .detail-intro {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .detail-intro p { margin: 0; font-size: 14px; color: var(--muted); max-width: 640px; line-height: 1.55; }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      color: #333;
      flex: 0 0 auto;
      cursor: pointer;
    }

    .toggle input { width: 16px; height: 16px; accent-color: var(--ink); }

    .det-group-head {
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin: 30px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    .det-list { display: flex; flex-direction: column; gap: 16px; }

    .det-card {
      background: var(--card);
      border: 1px solid var(--ink);
      padding: 18px;
      display: flex;
      gap: 22px;
    }

    .det-thumb {
      flex: 0 0 auto;
      width: 220px;
      border: 1px solid var(--ink);
      background: var(--paper);
      padding: 0;
      overflow: hidden;
      cursor: zoom-in;
      align-self: flex-start;
      position: relative;
      display: block;
    }

    .det-thumb img { width: 100%; height: auto; display: block; }

    .det-thumb .zoom {
      position: absolute;
      right: 8px;
      bottom: 8px;
      background: rgba(0, 0, 0, 0.82);
      color: #fff;
      font-size: 11px;
      padding: 4px 8px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .det-thumb:hover .zoom { opacity: 1; }

    .det-thumb .imgfail {
      aspect-ratio: 581 / 708;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--muted);
      font-family: ui-monospace, Menlo, monospace;
      text-align: center;
      padding: 12px;
      background: repeating-linear-gradient(45deg, transparent 0 12px, rgba(0, 0, 0, 0.03) 12px 24px), var(--gray);
    }

    .det-body { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 12px; }

    .det-crumb { font-size: 12px; color: var(--muted); letter-spacing: 0.03em; }
    .det-crumb b { color: var(--ink); }

    .det-title { font-size: 18px; font-weight: 700; margin: 0; line-height: 1.25; }

    .det-desc { font-size: 14px; line-height: 1.6; margin: 0; color: #2b2b2b; }

    .commentary {
      background: var(--yellow-soft);
      border: 1px solid #000;
      border-left: 4px solid var(--yellow);
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
    }

    .commentary .clab {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
      color: #7a5c00;
      display: block;
      margin-bottom: 5px;
    }

    .ficha { border-top: 1px solid var(--line); padding-top: 14px; display: flex; flex-direction: column; gap: 14px; }

    .ficha-field { display: flex; flex-direction: column; gap: 8px; }

    .ficha-lab { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; }

    .chips { display: flex; flex-wrap: wrap; gap: 7px; }

    .chip {
      display: inline-flex;
      align-items: center;
      background: var(--yellow);
      color: var(--ink);
      border: 1px solid var(--ink);
      font-size: 12.5px;
      line-height: 1;
      padding: 6px 11px;
      cursor: help;
    }

    .chip.gray-chip { background: var(--card); }

    .heurs { display: flex; flex-direction: column; gap: 8px; }

    .heur {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .heur .hid {
      flex: 0 0 auto;
      background: var(--ink);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 7px;
      cursor: help;
      font-variant-numeric: tabular-nums;
    }

    .heur .hname { flex: 1 1 160px; font-size: 13.5px; }

    .heur .hsev { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 7px; cursor: help; }

    .heur .sevbox {
      width: 22px;
      height: 22px;
      border: 1px solid var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .heur .sevlab { font-size: 12px; color: var(--muted); }

    .obs { font-size: 13.5px; line-height: 1.6; color: #2b2b2b; margin: 0; }

    .empty-state {
      text-align: center;
      padding: 70px 20px;
      color: var(--muted);
      font-size: 15px;
      border: 1px dashed var(--ink);
      background: var(--card);
    }

    /* ========================== LIGHTBOX ========================== */
    .lb {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(10, 10, 10, 0.95);
      display: none;
      flex-direction: column;
      color: #fff;
    }

    .lb.is-open { display: flex; }

    .lb-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      flex: 0 0 auto;
    }

    .lb-meta { font-size: 14px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .lb-meta b { font-weight: 700; }
    .lb-meta .sep { opacity: 0.5; }
    .lb-meta .count { opacity: 0.7; font-size: 13px; }

    .lb-close {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: transparent;
      color: #fff;
      font-size: 18px;
    }

    .lb-close:hover { background: rgba(255, 255, 255, 0.12); }

    .lb-stage {
      flex: 1 1 auto;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 0 16px 16px;
    }

    .lb-img { max-width: min(900px, 92vw); max-height: 100%; width: auto; height: auto; display: block; box-shadow: 0 8px 50px rgba(0, 0, 0, 0.6); }

    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      border: 0;
      background: var(--yellow);
      color: var(--ink);
      font-size: 26px;
      opacity: 0.92;
      z-index: 2;
    }

    .lb-nav:hover { opacity: 1; }
    .lb-prev { left: 16px; }
    .lb-next { right: 16px; }
    .lb-cap { padding: 12px 20px; flex: 0 0 auto; text-align: center; font-size: 13.5px; color: rgba(255, 255, 255, 0.85); line-height: 1.5; }

    /* ========================== LOADING ========================== */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      min-height: 60vh;
      color: var(--muted);
      font-size: 16px;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid var(--gray);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========================== RESPONSIVE ========================== */
    @media (max-width: 900px) {
      :root { --pad: 20px; }
      .stat-cards { grid-template-columns: repeat(2, 1fr); }
      .seg { margin-left: 0; }
      .det-card { flex-direction: column; gap: 16px; }
      .det-thumb { width: 100%; max-width: 320px; }
    }

    @media (max-width: 540px) {
      .stat-cards { grid-template-columns: 1fr 1fr; }
      .dash-head h1 { font-size: 24px; }
      .filterbar { gap: 14px; }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="wrap">
      <div class="loading">
        <div class="spinner"></div>
        <span>Carregando dados de análise…</span>
      </div>
    </div>
  </div>

  <!-- shared taxonomy (Brignull / Gray / Nielsen) — single source of truth -->
  <script src="../js/checklist-data.js?v=2"></script>
  <script src="dashboard.js?v=1"></script>
</body>

</html>
